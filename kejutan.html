<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kejutan Spesial! ❤️</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #e9e0d2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
        }
        
        .card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 90%;
            text-align: center;
            z-index: 10;
        }

        /* Wrapper Peta dengan Zoom */
        .map-wrapper {
            position: relative;
            width: 100%;
            height: 250px; 
            margin: 20px 0;
            border-radius: 15px;
            border: 2px dashed #d4bdac;
            background-color: #f5f0e1;
            overflow: hidden; /* Supaya zoom tidak keluar kotak */
            cursor: pointer;
        }

        /* Konten Peta yang akan di-zoom */
        .map-content {
            width: 100%;
            height: 100%;
            background-image: url('peta.jpeg'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transition: transform 3s ease-in-out; /* Efek cinematic zoom */
            transform: scale(1);
        }

        /* Class untuk mengaktifkan Zoom ke area Sumatra-Jawa */
        .zoomed {
            transform: scale(3.5) translate(22%, -18%); 
        }

        .dot {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            z-index: 10;
        }

        #dot-prabumulih {
            top: 72%; 
            left: 21.5%;
            background-color: #533e2d; 
            box-shadow: 0 0 10px rgba(83, 62, 45, 0.8);
            animation: pulse 1.5s infinite;
        }

        #dot-jakarta {
            top: 83%; 
            left: 27%;
            background-color: #d4bdac; 
            box-shadow: 0 0 10px rgba(212, 189, 172, 0.8);
            animation: pulse 1.5s infinite;
        }

        .label {
            position: absolute;
            font-size: 4px; /* Kecil karena kena zoom */
            color: #533e2d;
            font-weight: 700;
            z-index: 11;
            background: rgba(255,255,255,0.8);
            padding: 0.5px 2px;
            border-radius: 2px;
            white-space: nowrap;
        }

        #label-prabumulih { top: 68%; left: 16%; }
        #label-jakarta { top: 86%; left: 24%; }

        .love-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
        }

        .path {
            stroke: #533e2d;
            stroke-width: 1.5;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            fill: none;
            stroke-linecap: round;
            animation: draw 3s ease-in-out forwards;
            animation-delay: 3.5s; /* Tunggu zoom selesai baru gambar garis */
        }

        .heart-marker {
            opacity: 0;
            animation: appear 1s forwards;
            animation-delay: 6s;
        }

        @keyframes draw { to { stroke-dashoffset: 0; } }
        @keyframes appear { to { opacity: 1; transform: scale(1); } }
        @keyframes pulse {
            0% { transform: scale(0.9); }
            70% { transform: scale(1.2); }
            100% { transform: scale(0.9); }
        }

        .fade-in {
            opacity: 0;
            animation: fadeIn 1.5s forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="card fade-in">
        <div class="top-deco">📍 Jarak Bukan Penghalang</div>
        <h1 class="dancing-font" style="font-size: 1.8rem; margin: 10px 0;">Sumatra ✈️ Jawa</h1>
        <p class="text-content" style="font-size: 0.9rem;">Meski terpisah pulau, rindu ini selalu punya cara untuk sampai. Selamat Ulang Tahun, Sayang! ❤️</p>

        <div class="map-wrapper" onclick="toggleLove()">
            <div id="mapContainer" class="map-content">
                <div id="dot-prabumulih" class="dot"></div>
                <div id="label-prabumulih" class="label">Prabumulih</div>

                <div id="dot-jakarta" class="dot"></div>
                <div id="label-jakarta" class="label">Jakarta Barat</div>

                <svg class="love-line" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path id="lovePath" class="path" d="M21.5,72 Q23,78 27,83"></path>
                    <text id="heartIcon" class="heart-marker" x="23" y="80" fill="#e74c3c" font-size="5">❤️</text>
                </svg>
            </div>
        </div>

        <p class="signature dancing-font" style="font-size: 1.3rem;">With Love, Reihan</p>
        <p style="font-size: 0.6rem; color: #a69080;">(Tap petanya buat kirim balik rindu ✨)</p>
    </div>

    <script>
        // 1. Efek Zoom Otomatis saat halaman dimuat
        window.onload = function() {
            setTimeout(() => {
                document.getElementById('mapContainer').classList.add('zoomed');
            }, 500);
        };

        // 2. Fungsi Klik Bolak-balik (Prabumulih <-> Jakarta)
        let isReversed = false;
        function toggleLove() {
            const path = document.getElementById('lovePath');
            const heart = document.getElementById('heartIcon');
            
            if (!isReversed) {
                // Balik: Jakarta ke Prabumulih
                path.setAttribute('d', 'M27,83 Q23,78 21.5,72');
                heart.setAttribute('x', '23');
                heart.setAttribute('y', '77');
                isReversed = true;
            } else {
                // Normal: Prabumulih ke Jakarta
                path.setAttribute('d', 'M21.5,72 Q23,78 27,83');
                heart.setAttribute('x', '23');
                heart.setAttribute('y', '80');
                isReversed = false;
            }

            // Reset animasi agar garis menggambar ulang
            path.style.animation = 'none';
            path.offsetHeight; // trigger reflow
            path.style.animation = 'draw 2s ease-in-out forwards';
        }
    </script>
</body>
</html>
