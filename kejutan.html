<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kejutan Spesial! ❤️</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500;600&display=swap" rel="stylesheet">
    <style>
        /* --- BACKGROUND & CARD --- */
        body {
            background-color: #e9e0d2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
        }
        
        .card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 92%;
            text-align: center;
            z-index: 10;
            position: relative;
        }

        /* --- MAP CONTAINER (GPS STYLE) --- */
        .map-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9; /* Kunci proporsi agar tidak lari di HP */
            margin: 20px 0;
            border-radius: 15px;
            border: 2px dashed #d4bdac;
            background-color: #f5f0e1;
            overflow: hidden;
            cursor: pointer;
        }

        /* Konten Peta yang akan di-zoom */
        #mapContent {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('peta.jpeg'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transition: transform 3.5s cubic-bezier(0.4, 0, 0.2, 1); /* Zoom smooth ala drone */
            transform: scale(1);
        }

        /* Titik Fokus Zoom (Menyesuaikan letak Sumatra-Jawa) */
        .zoomed {
            transform: scale(4.2) translate(21%, -18%); 
        }

        /* --- TITIK LOKASI (DOTS) --- */
        .dot {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            z-index: 10;
        }

        #dot-prabumulih {
            top: 72.5%; 
            left: 21.3%;
            background-color: #533e2d; 
            box-shadow: 0 0 8px rgba(83, 62, 45, 0.8);
            animation: pulse 1.5s infinite;
        }

        #dot-jakarta {
            top: 83.5%; 
            left: 26.9%;
            background-color: #d4bdac; 
            box-shadow: 0 0 8px rgba(212, 189, 172, 0.8);
            animation: pulse 1.5s infinite;
        }

        /* --- LABEL KOTA --- */
        .label {
            position: absolute;
            font-size: 3.5px; /* Kecil karena akan membesar saat zoom */
            color: #533e2d;
            font-weight: 700;
            z-index: 11;
            background: rgba(255,255,255,0.7);
            padding: 0.5px 2px;
            border-radius: 2px;
            white-space: nowrap;
        }

        #label-prabumulih { top: 69%; left: 16%; }
        #label-jakarta { top: 87%; left: 24%; }

        /* --- GARIS CINTA (SVG) --- */
        .love-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        .path {
            stroke: #e74c3c; /* Warna Merah Hati */
            stroke-width: 1;
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            fill: none;
            stroke-linecap: round;
            animation: draw 3s ease-in-out forwards;
            animation-delay: 3.5s; /* Garis jalan setelah zoom selesai */
        }

        .heart-marker {
            opacity: 0;
            animation: appear 1s forwards;
            animation-delay: 6s; /* Hati muncul di akhir garis */
        }

        /* --- ANIMASI KEYFRAMES --- */
        @keyframes draw { to { stroke-dashoffset: 0; } }
        @keyframes appear { to { opacity: 1; transform: scale(1.2); } }
        @keyframes pulse {
            0% { transform: scale(0.9); }
            70% { transform: scale(1.2); }
            100% { transform: scale(0.9); }
        }

        .fade-in {
            opacity: 0;
            animation: fadeIn 1.5s forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }

        .dancing-font { font-family: 'Dancing Script', crossorigin; }
    </style>
</head>
<body>

    <div class="card fade-in">
        <div style="color: #a69080; font-weight: bold; font-size: 0.8rem;">📍 Jarak Bukan Penghalang</div>
        <h1 class="dancing-font" style="font-size: 1.8rem; margin: 10px 0; color: #533e2d;">Sumatra ✈️ Jawa</h1>
        
        <p style="font-size: 0.9rem; color: #555; line-height: 1.4;">
            Meski terpisah pulau, rindu ini selalu punya cara untuk sampai.<br>
            Selamat Ulang Tahun, Sayang! ❤️
        </p>

        <div class="map-wrapper" onclick="toggleLove()">
            <div id="mapContent">
                <div id="dot-prabumulih" class="dot"></div>
                <div id="label-prabumulih" class="label">Prabumulih</div>

                <div id="dot-jakarta" class="dot"></div>
                <div id="label-jakarta" class="label">Jakarta Barat</div>

                <svg class="love-line" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path id="lovePath" class="path" d="M21.3,72.5 Q23.5,78 26.9,83.5"></path>
                    <text id="heartIcon" class="heart-marker" x="23.5" y="79" fill="#e74c3c" font-size="6">❤️</text>
                </svg>
            </div>
        </div>

        <p class="signature dancing-font" style="font-size: 1.4rem; color: #533e2d; margin-bottom: 5px;">With Love, Reihan</p>
        <p style="font-size: 0.65rem; color: #a69080; font-style: italic;">(Tap petanya buat kirim balik rindu ✨)</p>
    </div>

    <script>
        // 1. Jalankan Zoom Otomatis pas halaman dibuka
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('mapContent').classList.add('zoomed');
            }, 800);
        });

        // 2. Fungsi Interaksi Klik (Bolak-balik)
        let isReversed = false;
        function toggleLove() {
            const path = document.getElementById('lovePath');
            const heart = document.getElementById('heartIcon');
            
            // Reset animasi agar bisa diulang
            path.style.animation = 'none';
            path.offsetHeight; // trigger reflow
            
            if (!isReversed) {
                // Balik: Jakarta -> Prabumulih
                path.setAttribute('d', 'M26.9,83.5 Q23.5,78 21.3,72.5');
                heart.setAttribute('x', '23');
                heart.setAttribute('y', '76');
                isReversed = true;
            } else {
                // Awal: Prabumulih -> Jakarta
                path.setAttribute('d', 'M21.3,72.5 Q23.5,78 26.9,83.5');
                heart.setAttribute('x', '23.5');
                heart.setAttribute('y', '79');
                isReversed = false;
            }
            
            path.style.animation = 'draw 2.5s ease-in-out forwards';
        }
    </script>

</body>
</html>
