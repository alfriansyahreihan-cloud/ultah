<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kejutan Spesial! ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f5f0e1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Quicksand', sans-serif;
        }
        
        .card {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            max-width: 400px;
            width: 85%;
            text-align: center;
            border: 1px solid #eee;
        }

        .header-label {
            color: #a69080;
            font-weight: bold;
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .main-title {
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            color: #533e2d;
            margin: 10px 0;
        }

        /* --- TIMELINE CONTAINER --- */
        .timeline-container {
            position: relative;
            height: 120px;
            margin: 40px 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Garis Putus-putus */
        .timeline-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: repeating-linear-gradient(to right, #d4bdac 0, #d4bdac 5px, transparent 5px, transparent 10px);
            z-index: 1;
        }

        /* Titik Kota */
        .city-node {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #533e2d;
            border-radius: 50%;
            z-index: 3;
            box-shadow: 0 0 10px rgba(83, 62, 45, 0.3);
        }

        .city-label {
            position: absolute;
            top: 25px;
            font-size: 0.8rem;
            font-weight: 700;
            color: #533e2d;
            white-space: nowrap;
        }

        #node-prabumulih { left: 0; }
        #node-jakarta { right: 0; }

        /* Icon Pesawat/Hati yang Bergerak */
        .travel-icon {
            position: absolute;
            left: 0;
            font-size: 1.5rem;
            z-index: 4;
            transform: translateY(-50%);
            animation: travel 4s cubic-bezier(0.45, 0, 0.55, 1) infinite;
        }

        @keyframes travel {
            0% { left: 0%; transform: translateY(-50%) rotate(0deg); }
            50% { left: 100%; transform: translateY(-50%) rotate(0deg); }
            51% { transform: translateY(-50%) rotateY(180deg); }
            99% { left: 0%; transform: translateY(-50%) rotateY(180deg); }
            100% { left: 0%; transform: translateY(-50%) rotate(0deg); }
        }

        /* Teks Pesan */
        .message {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .signature {
            font-family: 'Dancing Script', cursive;
            font-size: 1.5rem;
            color: #533e2d;
        }

        .btn-surprise {
            background: #533e2d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-surprise:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header-label">✨ Koneksi Rindu Terdeteksi</div>
        <h1 class="main-title">Sumatra - Jawa</h1>

        <div class="timeline-container">
            <div class="timeline-line"></div>
            
            <div id="node-prabumulih" class="city-node">
                <span class="city-label" style="left: -10px;">Prabumulih</span>
            </div>

            <div class="travel-icon">✈️</div>

            <div id="node-jakarta" class="city-node">
                <span class="city-label" style="right: -10px;">Jakarta Barat</span>
            </div>
        </div>

        <p class="message">
            "Jarak ribuan kilometer bukan alasan untuk berhenti. <br>
            Setiap detik yang berlalu adalah langkah menuju temu."
        </p>

        <p class="signature">With Love, Reihan</p>
        
        <button class="btn-surprise" onclick="celebrate()">Buka Kado 🎁</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        function celebrate() {
            // Efek Confetti saat tombol ditekan
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#533e2d', '#d4bdac', '#f1c40f', '#e74c3c']
            });

            // Ganti icon pesawat jadi hati saat diklik
            const icon = document.querySelector('.travel-icon');
            icon.innerText = '❤️';
            
            setTimeout(() => {
                alert("Selamat Ulang Tahun Sayang! Semoga rindu ini segera lunas! 🎂");
            }, 500);
        }
    </script>
</body>
</html>
