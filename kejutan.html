<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kejutan Spesial! ❤️</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500;600&display=swap" rel="stylesheet">
    <style>
        /* DASHBOARD UTAMA */
        body {
            background-color: #e9e0d2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            overflow-x: hidden;
        }
        
        .card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 90%;
            text-align: center;
            position: relative;
        }

        /* CONTAINER PETA RESPONSIF */
        .map-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9; /* Mengunci proporsi agar tidak gepeng di HP */
            margin: 20px 0;
            border-radius: 15px;
            border: 2px dashed #d4bdac;
            background-color: #f5f0e1;
            overflow: hidden; /* Supaya zoom tetap di dalam kotak */
            cursor: pointer;
            touch-action: manipulation;
        }

        /* KONTEN YANG DI-ZOOM */
        #mapContent {
            position: relative;
            width: 100%;
            height: 100%;
            background-image: url('peta.jpeg'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transition: transform 3s cubic-bezier(0.45, 0.05, 0.55, 0.95);
            transform: scale(1);
        }

        /* ZOOM FOCUS KE SUMATRA - JAWA */
        /* scale(4) untuk zoom dalam, translate(x, y) untuk geser kamera */
        .map-zoomed {
            transform: scale(4) translate(21%, -19%); 
        }

        /* TITIK LOKASI (Menggunakan % agar tetap di posisi yang sama walau di-zoom) */
        .dot {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            z-index: 10;
        }

        #dot-prabumulih {
            top: 72.5%; 
            left: 21.2%;
            background-color: #533e2d; 
            box-shadow: 0 0 5px rgba(83, 62, 45, 0.8);
            animation: pulse 1.5s infinite;
        }

        #dot-jakarta {
            top: 83.5%; 
            left: 26.8%;
            background-color: #d4bdac; 
            box-shadow: 0 0 5px rgba(212, 189, 172, 0.8);
            animation: pulse 1.5s infinite;
        }

        .label {
            position: absolute;
            font-size: 3px; /* Kecil karena akan ikut membesar saat zoom */
            color: #533e2d;
            font-weight: 700;
            z-index: 11;
            background: rgba(255,255,255,0.7);
            padding: 0.5px 2px;
            border-radius: 1px;
            white-space: nowrap;
        }

        #label-prabumulih { top: 69%; left: 16%; }
        #label-jakarta { top: 87%; left: 24%; }

        /* GARIS CINTA */
        .love-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        .path {
            stroke: #533e2d;
            stroke-width: 0.8;
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            fill: none;
            stroke-linecap: round;
            animation: draw 3s ease-in-out forwards;
            animation-delay: 3s; /* Garis muncul SETELAH zoom selesai */
        }

        .heart-marker {
            opacity: 0;
            animation: appear 1s forwards;
            animation-delay: 5.5s;
        }

        /* ANIMASI */
        @keyframes draw { to { stroke-dashoffset: 0; } }
        @keyframes appear { to { opacity: 1; transform: scale(1); } }
        @keyframes pulse {
            0% { transform: scale(0.8); }
            70% { transform: scale(1.3); }
            100% { transform: scale(0.8); }
        }

        .fade-in {
            opacity: 0;
            animation: fadeIn 1.5s forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }

        .hint {
            font-size: 0.7rem;
            color: #a69080;
            margin-top: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="card fade-in">
        <div class="top-deco">📍 Jarak Bukan Penghalang</div>
        <h1 class="dancing-font" style="font-size: 1.8rem; margin: 10px 0;">Sumatra ✈️ Jawa</h1>
        
        <p class="text-content" style="font-size: 0.9rem;">
            Meski terpisah pulau, rindu ini selalu punya cara untuk sampai.<br>
            Selamat Ulang Tahun, Sayang! ❤️
        </p>

        <div class="map-wrapper" onclick="toggleLove()">
            <div id="mapContent">
                <div id="dot-prabumulih" class="dot"></div>
                <div id="label-prabumulih" class="label">Prabumulih</div>

                <div id="dot-jakarta" class="dot"></div>
                <div id="label-jakarta" class="label">Jakarta Barat</div>

                <svg class="love-line" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path id="lovePath" class="path" d="M21.2,72.5 Q23.5,78 26.8,83.5"></path>
                    <text id="heartIcon" class="heart-marker" x="23" y="80" fill="#e74c3c" font-size="5">❤️</text>
                </svg>
            </div>
        </div>

        <p class="signature dancing-font" style="font-size: 1.3rem; margin-bottom: 5px;">With Love, Reihan</p>
        <p class="hint">(Tap petanya buat kirim rindu balik ✨)</p>
    </div>

    <script>
        // ZOOM OTOMATIS SAAT DIBUKA
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('mapContent').classList.add('map-zoomed');
            }, 800);
        });

        // INTERAKSI KLIK BOLAK-BALIK
        let isReversed = false;
        function toggleLove() {
            const path = document.getElementById('lovePath');
            const heart = document.getElementById('heartIcon');
            
            // Hapus animasi dulu agar bisa diulang
            path.style.animation = 'none';
            path.offsetHeight; 
            
            if (!isReversed) {
                // ARAH BALIK: Jakarta -> Prabumulih
                path.setAttribute('d', 'M26.8,83.5 Q23.5,78 21.2,72.5');
                heart.setAttribute('x', '23');
                heart.setAttribute('y', '77');
                isReversed = true;
            } else {
                // ARAH NORMAL: Prabumulih -> Jakarta
                path.setAttribute('d', 'M21.2,72.5 Q23.5,78 26.8,83.5');
                heart.setAttribute('x', '23');
                heart.setAttribute('y', '80');
                isReversed = false;
            }

            path.style.animation = 'draw 2s ease-in-out forwards';
        }
    </script>
</body>
</html>
