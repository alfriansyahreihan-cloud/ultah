<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kejutan Spesial! ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500;600&display=swap" rel="stylesheet">
    <style>
        /* --- STYLE DASAR --- */
        body {
            background-color: #e9e0d2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
        }
        
        .card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 90%;
            text-align: center;
            z-index: 10;
        }

        /* --- KOTAK PETA (MAP WRAPPER) --- */
        .map-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9; /* Kunci proporsi agar tidak gepeng di HP */
            margin: 20px 0;
            border-radius: 15px;
            border: 2px dashed #d4bdac;
            background-color: #1a1c20; /* Warna gelap estetik ala GPS */
            overflow: hidden;
            cursor: pointer;
            touch-action: manipulation;
        }

        /* Konten Peta yang akan di-zoom (DRONE VIEW) */
        #mapContent {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('peta.jpeg'); 
            background-size: contain; /* Foto peta tetap utuh */
            background-repeat: no-repeat;
            background-position: center center; /* KUNCI DI TENGAH */
            transition: transform 3.5s cubic-bezier(0.2, 0.8, 0.2, 1); /* Zoom super smooth */
            transform: scale(1);
            transform-origin: center center; /* Zoom dari titik tengah */
        }

        /* EFEK ZOOM PAS KE SUMATRA-JAWA */
        .map-zoomed {
            /* Scale(4) = Kedalaman Zoom, translate(X, Y) = Geser Kamera */
            transform: scale(4) translate(21%, -18%); 
        }

        /* --- TITIK KOORDINAT (DOTS) --- */
        .dot {
            position: absolute;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            z-index: 10;
        }

        /* Prabumulih (Sumatra Selatan) */
        #dot-prabumulih {
            top: 73%; 
            left: 21.2%;
            background-color: #f1c40f; /* Kuning GPS */
            box-shadow: 0 0 10px rgba(241, 196, 15, 0.8);
            animation: pulse 1.5s infinite;
        }

        /* Jakarta Barat (Jawa) */
        #dot-jakarta {
            top: 84%; 
            left: 27%;
            background-color: #dcdde1; 
            box-shadow: 0 0 10px rgba(220, 221, 225, 0.8);
            animation: pulse 1.5s infinite;
        }

        /* LABEL KOTA */
        .label {
            position: absolute;
            font-size: 3.2px; 
            color: #dcdde1;
            font-weight: 700;
            z-index: 11;
            background: rgba(0,0,0,0.6);
            padding: 0.5px 2px;
            border-radius: 2px;
            white-space: nowrap;
        }
        #label-prabumulih { top: 70%; left: 16%; }
        #label-jakarta { top: 88%; left: 23%; }

        /* --- JALUR CINTA SVG --- */
        .love-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        .path {
            stroke: #e74c3c; 
            stroke-width: 1;
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            fill: none;
            stroke-linecap: round;
            animation: draw 3s ease-in-out forwards;
            animation-delay: 3.5s; /* Garis muncul setelah zoom selesai */
        }

        .heart-marker {
            opacity: 0;
            animation: appear 1s forwards;
            animation-delay: 6s; 
        }

        /* --- ANIMASI --- */
        @keyframes draw { to { stroke-dashoffset: 0; } }
        @keyframes appear { to { opacity: 1; transform: scale(1); } }
        @keyframes pulse {
            0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(241, 196, 15, 0.7); }
            70% { transform: scale(1.3); box-shadow: 0 0 0 5px rgba(241, 196, 15, 0); }
            100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(241, 196, 15, 0); }
        }

        .fade-in {
            opacity: 0;
            animation: fadeIn 1.5s forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }

        .dancing-font { font-family: 'Dancing Script', cursive; }
    </style>
</head>
<body>

    <div class="card fade-in">
        <div style="color: #a69080; font-weight: bold; font-size: 0.8rem;">📍 Jarak Bukan Penghalang</div>
        <h1 class="dancing-font" style="font-size: 1.8rem; margin: 10px 0; color: #533e2d;">Sumatra ✈️ Jawa</h1>
        
        <p style="font-size: 0.9rem; color: #555; line-height: 1.4;">
            Meski terpisah pulau, rindu ini selalu punya cara untuk sampai.<br>
            Selamat Ulang Tahun, Sayang! ❤️
        </p>

        <div class="map-wrapper" onclick="toggleLove()">
            <div id="mapContent">
                <div id="dot-prabumulih" class="dot"></div>
                <div id="label-prabumulih" class="label">Prabumulih</div>

                <div id="dot-jakarta" class="dot"></div>
                <div id="label-jakarta" class="label">Jakarta Barat</div>

                <svg class="love-line" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path id="lovePath" class="path" d="M21.2,73 Q23.5,79 27,84"></path>
                    <text id="heartIcon" class="heart-marker" x="23.5" y="79" fill="#e74c3c" font-size="6">❤️</text>
                </svg>
            </div>
        </div>

        <p class="signature dancing-font" style="font-size: 1.4rem; color: #533e2d; margin-bottom: 5px;">With Love, Reihan</p>
        <p style="font-size: 0.65rem; color: #a69080; font-style: italic;">(Tap petanya buat kirim balik rindu ✨)</p>
    </div>

    <script>
        // Zoom Otomatis pas halaman dibuka
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('mapContent').classList.add('map-zoomed');
            }, 800);
        });

        // Fungsi Interaksi Balik (Bolak-balik)
        let isReversed = false;
        function toggleLove() {
            const path = document.getElementById('lovePath');
            const heart = document.getElementById('heartIcon');
            
            path.style.animation = 'none';
            path.offsetHeight; 
            
            if (!isReversed) {
                // Jakarta -> Prabumulih
                path.setAttribute('d', 'M27,84 Q23.5,79 21.2,73');
                heart.setAttribute('x', '23');
                heart.setAttribute('y', '77');
                isReversed = true;
            } else {
                // Prabumulih -> Jakarta
                path.setAttribute('d', 'M21.2,73 Q23.5,79 27,84');
                heart.setAttribute('x', '23.5');
                heart.setAttribute('y', '79');
                isReversed = false;
            }
            path.style.animation = 'draw 2.5s ease-in-out forwards';
        }
    </script>

</body>
</html>
