<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kejutan Spesial! ❤️</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500;600&display=swap" rel="stylesheet">
    <style>
        /* Style Khusus Buat Halaman Peta */
        body {
            background-color: #e9e0d2; /* Warna cream background file romantis */
        }
        
        .map-container {
            position: relative;
            width: 100%;
            height: 300px; /* Sesuaikan tinggi peta */
            margin-top: 30px;
            margin-bottom: 30px;
            overflow: hidden;
            border-radius: 15px;
            border: 2px dashed #d4bdac;
            background-color: #f5f0e1; /* Background peta */
        }

        /* Titik Lokasi */
        .location-dot {
            position: absolute;
            width: 12px;
            height: 12px;
            background-color: #533e2d; /* Warna cokelat tua tema kita */
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(83, 62, 45, 0.5);
            animation: pulse 1.5s infinite;
        }

        /* Prabumulih (Sumatra) */
        #dot-prabumulih {
            top: 20%; /* Sesuaikan posisi di peta */
            left: 15%;
        }

        /* Jakarta Barat (Jawa) */
        #dot-jakarta {
            bottom: 20%; /* Sesuaikan posisi di peta */
            right: 15%;
        }

        .location-label {
            position: absolute;
            font-size: 0.8rem;
            color: #6b5a4a;
            font-weight: 600;
        }

        #label-prabumulih {
            top: 25%;
            left: 10%;
        }

        #label-jakarta {
            bottom: 25%;
            right: 10%;
        }

        /* Garis Hati Penghubung (Animasi) */
        .love-line {
            position: absolute;
            top: 20%;
            left: 15%;
            width: 70%;
            height: 60%;
            overflow: hidden;
        }

        .love-line svg {
            width: 100%;
            height: 100%;
        }

        .love-path {
            stroke: #d4bdac; /* Warna cokelat muda putus-putus */
            stroke-width: 3;
            stroke-dasharray: 10, 5; /* Garis putus-putus */
            fill: none;
            stroke-linecap: round;
            animation: drawLine 3s ease-out forwards; /* Animasi menggambar garis */
        }

        /* Animasi */
        @keyframes drawLine {
            to {
                stroke-dashoffset: 0;
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(83, 62, 45, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(83, 62, 45, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(83, 62, 45, 0);
            }
        }

        .fade-in-text {
            opacity: 0;
            animation: fadeIn 1.5s ease-in forwards;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="top-deco fade-in-text">✨ Kejutan Kedua Buat Kamu</div>
        <h1 class="dancing-font fade-in-text">Beda Pulau, Satu Hati ❤️</h1>
        <p class="text-content fade-in-text" style="animation-delay: 1s;">Jarak itu cuma angka di peta, tapi doa dan rindu aku selalu sampai ke kamu.</p>

        <div class="map-container fade-in-text" style="animation-delay: 2s;">
            <div id="dot-prabumulih" class="location-dot"></div>
            <div id="label-prabumulih" class="location-label">Prabumulih</div>

            <div id="dot-jakarta" class="location-dot"></div>
            <div id="label-jakarta" class="location-label">Jakarta Barat</div>

            <div class="love-line">
                <svg viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path class="love-path" d="M15,20 C30,30 70,70 85,80" stroke-dashoffset="1000"></path>
                    <text x="50" y="55" text-anchor="middle" fill="#d4bdac" font-size="6" font-family="Quicksand" font-weight="600">Connecting Hearts...</text>
                </svg>
            </div>
        </div>

        <p class="signature dancing-font fade-in-text" style="animation-delay: 4s;">With Love, Reihan</p>
    </div>

</body>
</html>
