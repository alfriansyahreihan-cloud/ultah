<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kejutan Spesial! ❤️</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #e9e0d2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Quicksand', sans-serif;
        }
        
        .card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 90%;
            text-align: center;
        }

        .map-wrapper {
            position: relative;
            width: 100%;
            height: 250px; 
            margin: 20px 0;
            border-radius: 15px;
            border: 2px dashed #d4bdac;
            background-color: #f5f0e1;
            background-image: url('peta.jpeg'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* TITIK REAL GEOGRAFIS */
        .dot {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            z-index: 10;
        }

        /* Prabumulih, Sumatra Selatan */
        #dot-prabumulih {
            top: 72%; 
            left: 21.5%;
            background-color: #533e2d; 
            box-shadow: 0 0 10px rgba(83, 62, 45, 0.8);
            animation: pulse 1.5s infinite;
        }

        /* Jakarta Barat, Jawa */
        #dot-jakarta {
            top: 83%; 
            left: 27%;
            background-color: #d4bdac; 
            box-shadow: 0 0 10px rgba(212, 189, 172, 0.8);
            animation: pulse 1.5s infinite;
        }

        .label {
            position: absolute;
            font-size: 0.65rem;
            color: #533e2d;
            font-weight: 700;
            z-index: 11;
            background: rgba(255,255,255,0.8);
            padding: 1px 4px;
            border-radius: 4px;
            white-space: nowrap;
        }

        #label-prabumulih { top: 65%; left: 15%; }
        #label-jakarta { top: 88%; left: 24%; }

        /* Garis Animasi Melengkung Halus */
        .love-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
        }

        .path {
            stroke: #533e2d;
            stroke-width: 2.5;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            fill: none;
            stroke-linecap: round;
            animation: draw 3s ease-in-out forwards;
            animation-delay: 1s;
        }

        .heart-marker {
            opacity: 0;
            animation: appear 1s forwards;
            animation-delay: 3.5s;
        }

        @keyframes draw { to { stroke-dashoffset: 0; } }
        @keyframes appear { to { opacity: 1; transform: scale(1.2); } }
        @keyframes pulse {
            0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(83, 62, 45, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 8px rgba(83, 62, 45, 0); }
            100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(83, 62, 45, 0); }
        }

        .fade-in {
            opacity: 0;
            animation: fadeIn 1.5s forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="card fade-in">
        <div class="top-deco">📍 Jarak Bukan Penghalang</div>
        <h1 class="dancing-font" style="font-size: 1.8rem; margin: 10px 0;">Sumatra ✈️ Jawa</h1>
        <p class="text-content" style="font-size: 0.9rem;">Meski terpisah pulau, rindu ini selalu punya cara untuk sampai. Selamat Ulang Tahun, Sayang! ❤️</p>

        <div class="map-wrapper">
            <div id="dot-prabumulih" class="dot"></div>
            <div id="label-prabumulih" class="label">Prabumulih</div>

            <div id="dot-jakarta" class="dot"></div>
            <div id="label-jakarta" class="label">Jakarta Barat</div>

            <svg class="love-line" viewBox="0 0 100 100" preserveAspectRatio="none">
                <path class="path" d="M21.5,72 Q23,78 27,83"></path>
                <text class="heart-marker" x="23" y="80" fill="#e74c3c" font-size="6">❤️</text>
            </svg>
        </div>

        <p class="signature dancing-font" style="font-size: 1.3rem;">With Love, Reihan</p>
    </div>

</body>
</html>
