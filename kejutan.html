<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kejutan Spesial! ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500;600&display=swap" rel="stylesheet">
    <style>
        /* DASHBOARD UTAMA */
        body {
            background-color: #e9e0d2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
        }
        
        .card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 90%;
            text-align: center;
            z-index: 10;
        }

        /* --- CONTAINER PETA DIGITAL (RESPONSIF) --- */
        .map-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9; /* Kunci proporsi vector agar tidak gepeng */
            margin: 20px 0;
            border-radius: 15px;
            border: 2px dashed #d4bdac;
            background-color: #1a1c20; /* Warna gelap ala digital map */
            overflow: hidden;
            cursor: pointer;
        }

        /* Container yang akan di-zoom */
        #mapContent {
            position: absolute;
            width: 100%;
            height: 100%;
            transition: transform 3.5s cubic-bezier(0.4, 0, 0.2, 1);
            transform: scale(1);
        }

        /* Focus Zoom ke area Sumatra-Jawa */
        .zoomed {
            transform: scale(4) translate(20%, -18%); 
        }

        /* --- VECTOR PETA INDONESIA (SUMATRA-JAWA) --- */
        .map-vector {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            fill: #333; /* Siluet pulau kelabu gelap */
        }

        /* --- KOORDINAT GPS (DOTS & LABELS) --- */
        .coordinate-system {
            stroke: rgba(255,255,255,0.1); /* Garis grid halus */
            stroke-width: 0.2;
        }

        .gps-point {
            position: absolute;
            z-index: 10;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            border: 2px solid white;
            position: absolute;
            top: -4px;
            left: -4px;
        }

        /* Prabumulih (Sumatra Selatan) - Titik Cokelat */
        #gps-prabumulih {
            top: 73%; 
            left: 21%;
        }
        #dot-prabumulih {
            background-color: #f1c40f; 
            box-shadow: 0 0 10px rgba(241, 196, 15, 0.8);
            animation: pulse-gps 1.5s infinite;
        }

        /* Jakarta Barat (DKI Jakarta) - Titik Beige */
        #gps-jakarta {
            top: 84%; 
            left: 27%;
        }
        #dot-jakarta {
            background-color: #dcdde1; 
            box-shadow: 0 0 10px rgba(220, 221, 225, 0.8);
            animation: pulse-gps 1.5s infinite;
        }

        .label {
            position: absolute;
            font-size: 3.5px; /* Kecil karena akan membesar saat zoom */
            color: #dcdde1;
            font-weight: 700;
            background: rgba(0,0,0,0.5);
            padding: 0.5px 2px;
            border-radius: 2px;
            white-space: nowrap;
            top: 6px;
            left: -10px;
        }

        /* --- JALUR CINTA SVG (MELENGKUNG INDAH) --- */
        .love-line-gps {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        .path {
            stroke: #f1c40f; /* Kuning GPS */
            stroke-width: 0.8;
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            fill: none;
            stroke-linecap: round;
            animation: draw-gps 3s ease-in-out forwards;
            animation-delay: 3.5s; /* Mulai setelah zoom drone selesai */
        }

        .heart-marker {
            opacity: 0;
            animation: appear-gps 1s forwards;
            animation-delay: 6s; /* Muncul di akhir garis */
        }

        /* --- ANIMASI KEYFRAMES --- */
        @keyframes draw-gps { to { stroke-dashoffset: 0; } }
        @keyframes appear-gps { to { opacity: 1; transform: scale(1.2); } }
        @keyframes pulse-gps {
            0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(241, 196, 15, 0.7); }
            70% { transform: scale(1.3); box-shadow: 0 0 0 5px rgba(241, 196, 15, 0); }
            100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(241, 196, 15, 0); }
        }

        .fade-in {
            opacity: 0;
            animation: fadeIn 1.5s forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }

        .dancing-font { font-family: 'Dancing Script', sans-serif; }
    </style>
</head>
<body>

    <div class="card fade-in">
        <div style="color: #a69080; font-weight: bold; font-size: 0.8rem;">📍 Jarak Bukan Penghalang</div>
        <h1 class="dancing-font" style="font-size: 1.8rem; margin: 10px 0; color: #533e2d;">Sumatra ✈️ Jawa</h1>
        
        <p style="font-size: 0.9rem; color: #555; line-height: 1.4;">
            Meski terpisah pulau, rindu ini selalu punya cara untuk sampai.<br>
            Selamat Ulang Tahun, Sayang! ❤️
        </p>

        <div class="map-wrapper" onclick="toggleLove()">
            <div id="mapContent">
                
                <svg class="map-vector" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <g class="coordinate-system">
                        <line x1="10" y1="70" x2="40" y2="70" />
                        <line x1="10" y1="80" x2="40" y2="80" />
                        <line x1="20" y1="65" x2="20" y2="90" />
                        <line x1="30" y1="65" x2="30" y2="90" />
                    </g>
                    <path d="M12,65 Q18,68 22,73 Q25,78 27,84 L29,88 Q35,89 40,88" fill="none" stroke="#333" stroke-width="2.5" />
                </svg>

                <svg class="love-line-gps" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path id="lovePath" class="path" d="M21,73 Q23.5,78.5 27,84"></path>
                    <text id="heartIcon" class="heart-marker" x="23.5" y="79.5" fill="red" font-size="6">❤️</text>
                </svg>

                <div id="gps-prabumulih" class="gps-point">
                    <div id="dot-prabumulih" class="dot"></div>
                    <div class="label">Prabumulih</div>
                </div>
                <div id="gps-jakarta" class="gps-point">
                    <div id="dot-jakarta" class="dot"></div>
                    <div class="label">Jakarta Barat</div>
                </div>

            </div>
        </div>

        <p class="signature dancing-font" style="font-size: 1.4rem; color: #533e2d; margin-bottom: 5px;">With Love, Reihan</p>
        <p style="font-size: 0.65rem; color: #a69080; font-style: italic;">(Tap petanya buat kirim balik rindu ✨)</p>
    </div>

    <script>
        // ZOOM OTOMATIS SAAT DIBUKA
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('mapContent').classList.add('zoomed');
            }, 800);
        });

        // INTERAKSI KLIK BOLAK-BALIK
        let isReversed = false;
        function toggleLove() {
            const path = document.getElementById('lovePath');
            const heart = document.getElementById('heartIcon');
            
            // Reset animasi
            path.style.animation = 'none';
            path.offsetHeight; 
            
            if (!isReversed) {
                // Balik: Jakarta -> Prabumulih
                path.setAttribute('d', 'M27,84 Q23.5,78.5 21,73');
                heart.setAttribute('x', '23');
                heart.setAttribute('y', '77');
                isReversed = true;
            } else {
                // Awal: Prabumulih -> Jakarta
                path.setAttribute('d', 'M21,73 Q23.5,78.5 27,84');
                heart.setAttribute('x', '23.5');
                heart.setAttribute('y', '79.5');
                isReversed = false;
            }
            path.style.animation = 'draw-gps 2.5s ease-in-out forwards';
        }
    </script>

</body>
</html>
