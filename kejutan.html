<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kejutan Spesial! ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500;600&display=swap" rel="stylesheet">
    <style>
        /* DASHBOARD UTAMA */
        body {
            background-color: #e9e0d2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
        }
        
        .card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 90%;
            text-align: center;
            z-index: 10;
        }

        /* --- CONTAINER PETA DIGITAL (RESPONSIF) --- */
        .map-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9; /* Kunci proporsi agar tidak lari di HP */
            margin: 20px 0;
            border-radius: 15px;
            border: 2px dashed #d4bdac;
            background-color: #f5f0e1; 
            overflow: hidden;
            cursor: pointer;
            touch-action: manipulation;
        }

        /* Container yang di-zoom (Drone View Smooth) */
        #mapContent {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: url('peta.jpeg'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            /* Cubic-bezier membuat transisi zoom sangat halus (Smooth) */
            transition: transform 4s cubic-bezier(0.25, 1, 0.5, 1);
            transform: scale(1);
            transform-origin: center center;
        }

        /* Focus Zoom ke area Sumatra-Jawa */
        .map-zoomed {
            transform: scale(4.2) translate(21.5%, -18.5%); 
        }

        /* --- TITIK KOORDINAT --- */
        .dot {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            z-index: 10;
        }

        /* Prabumulih (Sumatra Selatan) */
        #dot-prabumulih {
            top: 72.5%; 
            left: 21.2%;
            background-color: #533e2d; 
            box-shadow: 0 0 8px rgba(83, 62, 45, 0.8);
            animation: pulse 1.5s infinite;
        }

        /* Jakarta Barat (Jawa) */
        #dot-jakarta {
            top: 83.5%; 
            left: 26.8%;
            background-color: #d4bdac; 
            box-shadow: 0 0 8px rgba(212, 189, 172, 0.8);
            animation: pulse 1.5s infinite;
        }

        /* LABEL KOTA (Kecil agar pas saat di-zoom) */
        .label {
            position: absolute;
            font-size: 3.5px; 
            color: #533e2d;
            font-weight: 700;
            z-index: 11;
            background: rgba(255,255,255,0.7);
            padding: 0.5px 2px;
            border-radius: 2px;
            white-space: nowrap;
        }
        #label-prabumulih { top: 69%; left: 16%; }
        #label-jakarta { top: 87%; left: 24%; }

        /* --- JALUR CINTA --- */
        .love-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        .path {
            stroke: #e74c3c; 
            stroke-width: 1;
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            fill: none;
            stroke-linecap: round;
            animation: draw 3s ease-in-out forwards;
            animation-delay: 4s; /* Muncul setelah zoom drone selesai */
        }

        .heart-marker {
            opacity: 0;
            animation: appear 1s forwards;
            animation-delay: 6.5s; 
        }

        /* --- ANIMASI KEYFRAMES --- */
        @keyframes draw { to { stroke-dashoffset: 0; } }
        @keyframes appear { to { opacity: 1; transform: scale(1); } }
        @keyframes pulse {
            0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(83, 62, 45, 0.7); }
            70% { transform: scale(1.3); box-shadow: 0 0 0 5px rgba(83, 62, 45, 0); }
            100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(83, 62, 45, 0); }
        }

        .fade-in {
            opacity: 0;
            animation: fadeIn 1.5s forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }

        .dancing-font { font-family: 'Dancing Script', cursive; }
    </style>
</head>
<body>

    <div class="card fade-in">
        <div style="color: #a69080; font-weight: bold; font-size: 0.8rem;">📍 Jarak Bukan Penghalang</div>
        <h1 class="dancing-font" style="font-size: 1.8rem; margin: 10px 0; color: #533e2d;">Sumatra ✈️ Jawa</h1>
        
        <p style="font-size: 0.9rem; color: #555; line-height: 1.4;">
            Meski terpisah pulau, rindu ini selalu punya cara untuk sampai.<br>
            Selamat Ulang Tahun, Sayang! ❤️
        </p>

        <div class="map-wrapper" onclick="toggleLove()">
            <div id="mapContent">
                <div id="dot-prabumulih" class="dot"></div>
                <div id="label-prabumulih" class="label">Prabumulih</div>

                <div id="dot-jakarta" class="dot"></div>
                <div id="label-jakarta" class="label">Jakarta Barat</div>

                <svg class="love-line" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <path id="lovePath" class="path" d="M21.2,72.5 Q23.5,78 26.8,83.5"></path>
                    <text id="heartIcon" class="heart-marker" x="23.2" y="79" fill="#e74c3c" font-size="6">❤️</text>
                </svg>
            </div>
        </div>

        <p class="signature dancing-font" style="font-size: 1.4rem; color: #533e2d; margin-bottom: 5px;">With Love, Reihan</p>
        <p style="font-size: 0.65rem; color: #a69080; font-style: italic;">(Tap petanya buat kirim balik rindu ✨)</p>
    </div>

    <script>
        // Zoom Otomatis pas halaman dibuka
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('mapContent').classList.add('map-zoomed');
            }, 800);
        });

        // Fungsi Interaksi Balik (Jakarta ke Prabumulih)
        let isReversed = false;
        function toggleLove() {
            const path = document.getElementById('lovePath');
            const heart = document.getElementById('heartIcon');
            
            // Restart animasi
            path.style.animation = 'none';
            path.offsetHeight; 
            
            if (!isReversed) {
                // Balik: Jakarta -> Prabumulih
                path.setAttribute('d', 'M26.8,83.5 Q23.5,78 21.2,72.5');
                heart.setAttribute('x', '23');
                heart.setAttribute('y', '77');
                isReversed = true;
            } else {
                // Awal: Prabumulih -> Jakarta
                path.setAttribute('d', 'M21.2,72.5 Q23.5,78 26.8,83.5');
                heart.setAttribute('x', '23.2');
                heart.setAttribute('y', '79');
                isReversed = false;
            }
            path.style.animation = 'draw 2.5s ease-in-out forwards';
        }
    </script>

</body>
</html>
