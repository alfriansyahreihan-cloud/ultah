<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kejutan Spesial! ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #e9e0d2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
        }
        
        .card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 90%;
            text-align: center;
        }

        /* CONTAINER RADAR GPS */
        .map-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            margin: 20px 0;
            border-radius: 15px;
            background-color: #1a1c20; /* Dark GPS Mode */
            overflow: hidden;
            border: 2px solid #333;
            cursor: pointer;
        }

        #mapContent {
            position: absolute;
            width: 100%;
            height: 100%;
            transition: transform 3.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform: scale(1);
        }

        /* ZOOM DRONE VIEW */
        .zoomed {
            transform: scale(3.5) translate(22%, -18%); 
        }

        /* PETA VECTOR (ANTI-MELESET) */
        .map-svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 5px rgba(0,255,255,0.1));
        }

        /* TITIK GPS */
        .dot {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            z-index: 10;
        }

        #gps-prabumulih { top: 73%; left: 21%; background: #f1c40f; box-shadow: 0 0 10px #f1c40f; animation: pulse 1.5s infinite; }
        #gps-jakarta { top: 84%; left: 27%; background: #dcdde1; box-shadow: 0 0 10px #dcdde1; animation: pulse 1.5s infinite; }

        .label {
            position: absolute;
            font-size: 3.5px;
            color: #eee;
            font-weight: 700;
            background: rgba(0,0,0,0.6);
            padding: 0.5px 2px;
            border-radius: 2px;
            white-space: nowrap;
        }

        #label-prabumulih { top: 69%; left: 16%; }
        #label-jakarta { top: 87%; left: 24%; }

        /* GARIS RINDU */
        .path {
            stroke: #e74c3c;
            stroke-width: 0.8;
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            fill: none;
            stroke-linecap: round;
            animation: draw 3s ease-in-out forwards;
            animation-delay: 3.5s;
        }

        .heart-marker {
            opacity: 0;
            animation: appear 1s forwards;
            animation-delay: 6s;
        }

        @keyframes draw { to { stroke-dashoffset: 0; } }
        @keyframes appear { to { opacity: 1; transform: scale(1.2); } }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            70% { transform: scale(2.5); opacity: 0; }
            100% { transform: scale(1); opacity: 0; }
        }

        .dancing-font { font-family: 'Dancing Script', cursive; }
    </style>
</head>
<body>

    <div class="card">
        <div style="color: #a69080; font-weight: bold; font-size: 0.8rem;">📍 GPS: Tracking Love Connection</div>
        <h1 class="dancing-font" style="font-size: 1.8rem; margin: 10px 0; color: #533e2d;">Sumatra ✈️ Jawa</h1>
        
        <p style="font-size: 0.85rem; color: #666;">Meski terpisah pulau, rindu ini selalu punya koordinat yang tepat untuk pulang. ❤️</p>

        <div class="map-wrapper" onclick="toggleLove()">
            <div id="mapContent">
                <svg class="map-svg" viewBox="0 0 100 100">
                    <g stroke="rgba(255,255,255,0.05)" stroke-width="0.1">
                        <line x1="0" y1="70" x2="100" y2="70" /><line x1="0" y1="80" x2="100" y2="80" />
                        <line x1="20" y1="0" x2="20" y2="100" /><line x1="30" y1="0" x2="30" y2="100" />
                    </g>
                    <path d="M10,60 L15,65 L22,73 L25,78 L28,85 L35,88 L45,87" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
                    
                    <path id="lovePath" class="path" d="M21,73 Q23.5,78.5 27,84"></path>
                    <text id="heartIcon" class="heart-marker" x="23" y="79.5" fill="red" font-size="5">❤️</text>
                </svg>

                <div id="gps-prabumulih" class="dot"></div>
                <div id="label-prabumulih" class="label">Prabumulih</div>

                <div id="gps-jakarta" class="dot"></div>
                <div id="label-jakarta" class="label">Jakarta Barat</div>
            </div>
        </div>

        <p class="signature dancing-font" style="font-size: 1.4rem; color: #533e2d; margin-bottom: 5px;">With Love, Reihan</p>
        <p style="font-size: 0.6rem; color: #a69080;">(Tap peta untuk sinkronisasi rindu ✨)</p>
    </div>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('mapContent').classList.add('zoomed');
            }, 800);
        });

        let isReversed = false;
        function toggleLove() {
            const path = document.getElementById('lovePath');
            const heart = document.getElementById('heartIcon');
            path.style.animation = 'none';
            path.offsetHeight; 
            
            if (!isReversed) {
                path.setAttribute('d', 'M27,84 Q23.5,78.5 21,73');
                heart.setAttribute('x', '22.5'); heart.setAttribute('y', '77.5');
                isReversed = true;
            } else {
                path.setAttribute('d', 'M21,73 Q23.5,78.5 27,84');
                heart.setAttribute('x', '23'); heart.setAttribute('y', '79.5');
                isReversed = false;
            }
            path.style.animation = 'draw 2.5s ease-in-out forwards';
        }
    </script>
</body>
</html>
