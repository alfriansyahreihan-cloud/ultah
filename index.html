<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Sayang! ❤️</title>
    
    <link rel="stylesheet" href="css/style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div class="envelope-wrapper floating">
        <div class="location-box">
            📍 Terpisah Pulau, Tapi Dekat di Doa
        </div>
        
        <h1>Happy Birthday! 🎂</h1>
        
        <div id="typing-text"></div>

        <button class="btn-surprise" onclick="celebrate()">Klik Kejutan ✨</button>
    </div>

    <script>
        // ISI PESAN KAMU DI SINI:
        const text = "Meski raga kita di pulau yang berbeda, tapi hari ini seluruh doa aku cuma tertuju ke kamu. Selamat bertambah usia, ya! Makasih sudah jadi bagian paling indah di hidup aku walaupun kita belum pernah ketemu langsung. ❤️";
        
        let i = 0;
        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typing-text").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 50); // Kecepatan ngetik (50ms)
            }
        }

        // Jalankan efek ketik saat halaman terbuka
        window.onload = typeWriter;

        // Fungsi saat tombol diklik
        function celebrate() {
            // Efek Confetti (Kertas warna-warni)
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ff8fa3', '#ffb3c1', '#ffffff']
            });

            const btn = document.querySelector('.btn-surprise');
            btn.innerHTML = "I Love You! ❤️";
            btn.style.background = "#ff4d6d";
        }
    </script>
</body>
</html>
